server {
	listen 80;
	server_name _;
	root /usr/share/nginx/html;

	gzip on;
	gzip_vary on;
	gzip_min_length 256;
	gzip_types text/plain text/css application/javascript image/svg+xml application/xml application/json;

	server_tokens off;

	add_header X-Content-Type-Options "nosniff" always;
	add_header Referrer-Policy "strict-origin-when-cross-origin" always;
	add_header Permissions-Policy "interest-cohort=()" always;

	# HTML is the deploy target — never cache at the browser. The JSX files are
	# loaded as <script src> and transformed by Babel in the page, so they're
	# treated the same as JS for caching.
	location = / {
		try_files /index.html =404;
		add_header Cache-Control "public, max-age=0, must-revalidate" always;
	}

	location ~* \.html$ {
		add_header Cache-Control "public, max-age=0, must-revalidate" always;
	}

	# JSX served as text/babel; nginx defaults to application/octet-stream for
	# unknown extensions, which Babel Standalone refuses to fetch. Force a
	# script-friendly content type.
	location ~* \.jsx$ {
		types { } default_type "application/javascript; charset=utf-8";
		add_header Cache-Control "public, max-age=300, must-revalidate" always;
	}

	location ~* \.(css|js)$ {
		add_header Cache-Control "public, max-age=3600" always;
	}

	location ~* \.(svg|woff2?|png|jpe?g|webp)$ {
		add_header Cache-Control "public, max-age=86400" always;
	}

	location = /healthz {
		access_log off;
		return 200 "ok\n";
	}

	# Same-origin Umami proxy. Tunnel goes straight to this container; nginx
	# strips the /stats prefix and forwards to the umami container (both share
	# homelab_network, so Docker DNS resolves `umami`). Mirrors jazz-graph.
	location /stats/ {
		proxy_pass http://umami:3000/;
		proxy_http_version 1.1;
		proxy_set_header Host $host;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		proxy_set_header X-Real-IP $remote_addr;
	}

	location / {
		try_files $uri $uri/ =404;
	}
}
